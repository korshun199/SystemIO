<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SystemIO Chat | Monolith</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/uikit@3.16.22/dist/css/uikit.min.css" />
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/uikit@3.16.22/dist/js/uikit.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/uikit@3.16.22/dist/js/uikit-icons.min.js"></script>

    <style>
        :root { --bg: #0f0f0f; --panel: #1a1a1a; --accent: #32d296; --danger: #f0506e; }
        body { background: var(--bg); color: #e0e0e0; font-family: 'Segoe UI', sans-serif; overflow: hidden; margin: 0; }
        .hidden { display: none !important; }
        #main-screen { display: flex; flex-direction: column; height: 100vh; }
        .uk-navbar-container { background: var(--panel) !important; border-bottom: 1px solid #333; min-height: 50px; }
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; background: var(--bg); }

        /* ПУЗЫРИ СООБЩЕНИЙ */
        .msg-bubble { 
            border-radius: 8px; padding: 10px 14px; margin-bottom: 12px; 
            width: 85%; box-shadow: 0 2px 5px rgba(0,0,0,0.4);
            align-self: flex-start; position: relative;
        }
        .msg-left { background: #1e1e1e; border-left: 4px solid #444; }
        .msg-right { margin-left: 15%; background: #1a2e1a; border-left: 4px solid var(--accent); }
        .msg-private { border-left-color: var(--danger); background: #2a1212; }

        .controls-area { background: var(--panel); padding: 10px; border-top: 1px solid #333; display: flex; flex-direction: column; }
        .uk-input { background: #222 !important; color: #fff !important; border: 1px solid #333; }
        
        .custom-select-btn { 
            background: #222; color: #fff; border: 1px solid #333; 
            padding: 5px 10px; border-radius: 4px; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center;
            width: 100%; box-sizing: border-box; font-size: 0.85em;
        }
        .user-dropdown { background: #1a1a1a !important; border: 1px solid #333; min-width: 200px; }
        .user-link { color: #ccc !important; padding: 8px 12px !important; display: flex; align-items: center; }
        .user-link:hover { background: #222 !important; }
        .status-dot { margin-right: 10px; font-size: 1.2em; }

        @media (min-width: 641px) { .mobile-only { display: none !important; } .nav-select-wrap { width: 250px; margin-left: 20px; } }
        @media (max-width: 640px) { .nav-select-wrap { display: none !important; } .mobile-only { display: block !important; margin-bottom: 10px; } }
        #chat-box::-webkit-scrollbar { width: 4px; }
        #chat-box::-webkit-scrollbar-thumb { background: #333; }
    </style>
</head>
<body>

<div id="login-screen" class="uk-flex uk-flex-center uk-flex-middle uk-height-viewport">
    <div class="uk-card uk-card-secondary uk-card-body uk-width-large uk-margin-small-left uk-margin-small-right">
        <h3 class="uk-card-title uk-text-center uk-text-bold">SYSTEM IO</h3>
        <input id="login-user" class="uk-input uk-margin-small-bottom" type="text" placeholder="Логин">
        <input id="login-pass" class="uk-input uk-margin-small-bottom" type="password" placeholder="Пароль">
        <button onclick="auth()" class="uk-button uk-button-primary uk-width-1-1">ВОЙТИ</button>
        <p id="login-error" class="uk-text-danger uk-text-small uk-margin-small-top uk-text-center"></p>
    </div>
</div>

<div id="main-screen" class="hidden">
    <nav class="uk-navbar-container" uk-navbar>
        <div class="uk-navbar-left uk-margin-small-left">
            <span class="uk-text-success uk-text-bold uk-margin-small-right" id="display-name"></span>
            <button id="admin-btn" class="uk-button uk-button-danger uk-button-small hidden" onclick="window.location.href='/admin'">ПАНЕЛЬ</button>
            <div class="nav-select-wrap">
                <div class="custom-select-btn" id="target-btn-desktop">🌍 ОБЩИЙ КАНАЛ <span uk-icon="chevron-down"></span></div>
                <div uk-dropdown="mode: click; pos: bottom-left" class="user-dropdown">
                    <ul class="uk-nav uk-dropdown-nav" id="user-list-desktop"></ul>
                </div>
            </div>
        </div>
        <div class="uk-navbar-right uk-margin-small-right">
            <button onclick="logout()" class="uk-button uk-button-text" style="color: var(--danger)" uk-icon="icon: sign-out"></button>
        </div>
    </nav>
    <div id="chat-box"></div>
    <div class="controls-area">
        <div class="mobile-only">
            <div class="custom-select-btn" id="target-btn-mobile">🌍 ОБЩИЙ КАНАЛ <span uk-icon="chevron-down"></span></div>
            <div uk-dropdown="mode: click; pos: top-left" class="user-dropdown">
                <ul class="uk-nav uk-dropdown-nav" id="user-list-mobile"></ul>
            </div>
        </div>
        <div class="uk-grid-small" uk-grid>
            <div class="uk-width-expand"><input id="msg-input" class="uk-input uk-form-small" type="text" placeholder="Сообщение..."></div>
            <div class="uk-width-auto"><button onclick="send()" class="uk-button uk-button-primary uk-form-small" uk-icon="icon: receiver"></button></div>
        </div>
    </div>
</div>

<script>
    let myData = JSON.parse(localStorage.getItem('userData'));
    let currentTargetId = 0;
    let allUsers = []; // Храним список всех пользователей для проверки статуса

    const auth = () => {
        const u = $('#login-user').val(); const p = $('#login-pass').val();
        $.ajax({
            url: '/api/login', method: 'POST', contentType: 'application/json',
            data: JSON.stringify({username: u, password: p}),
            success: (res) => { if (res.status === 'ok') { localStorage.setItem('userData', JSON.stringify(res.user)); myData = res.user; showMain(); } else { $('#login-error').text(res.message); } }
        });
    };

    const selectUser = (id, name) => {
        currentTargetId = id;
        const displayName = id == 0 ? "🌍 ОБЩИЙ КАНАЛ" : "💬 " + name.toUpperCase();
        $('#target-btn-desktop, #target-btn-mobile').html(displayName + ' <span uk-icon="chevron-down"></span>');
        UIkit.dropdown('.user-dropdown').hide();
        loadChat();
    };

    const showMain = () => {
        $('#login-screen').addClass('hidden');
        $('#main-screen').removeClass('hidden').css('display', 'flex');
        $('#display-name').text(myData.username.toUpperCase());
        if (myData.id === 1 || myData.username.toLowerCase() === 'admin') { $('#admin-btn').removeClass('hidden'); }
        if (window.chatInterval) clearInterval(window.chatInterval);
        window.chatInterval = setInterval(() => { heartbeat(); updateUsers(); loadChat(); }, 3000);
        heartbeat(); updateUsers(); loadChat();
    };

    const logout = () => { localStorage.removeItem('userData'); location.reload(); };
    const heartbeat = () => { if (!myData) return; $.ajax({ url: '/api/heartbeat', method: 'POST', contentType: 'application/json', data: JSON.stringify({user_id: myData.id}) }); };

    const updateUsers = () => {
        $.get('/api/users', (data) => {
            allUsers = data; // Сохраняем актуальный список
            const listDesktop = $('#user-list-desktop');
            const listMobile = $('#user-list-mobile');
            const items = [];
            items.push(`<li><a href="#" class="user-link" onclick="selectUser(0, 'ОБЩИЙ КАНАЛ')">🌍 ОБЩИЙ КАНАЛ</a></li>`);
            data.forEach(u => {
                if (u.id != myData.id) {
                    const color = u.is_online ? '#32d296' : '#888';
                    const statusText = u.is_online ? 'в сети' : 'офлайн';
                    items.push(`<li><a href="#" class="user-link" onclick="selectUser(${u.id}, '${u.username}')"><span class="status-dot" style="color: ${color}">●</span><div><div style="font-weight: bold; font-size: 0.9em;">${u.username.toUpperCase()}</div><div style="font-size: 0.7em; color: ${color}">${statusText}</div></div></a></li>`);
                }
            });
            listDesktop.html(items.join(''));
            listMobile.html(items.join(''));
        });
    };

    const loadChat = () => {
        const url = currentTargetId == 0 ? `/api/chat/main/${myData.id}` : `/api/chat/private/${myData.id}/${currentTargetId}`;
        $.get(url, (msgs) => {
            const box = $('#chat-box');
            const isAtBottom = box[0].scrollHeight - box.scrollTop() <= box.outerHeight() + 100;
            msgs.sort((a, b) => new Date(a.timestamp.replace(' ', 'T')) - new Date(b.timestamp.replace(' ', 'T')) || a.id - b.id);
            
            const html = msgs.map(m => {
                let dStr = ""; let tStr = "--:--";
                if (m.timestamp) { const p = m.timestamp.split(' '); const d = p[0].split('-'); dStr = d[2] + "." + d[1]; tStr = p[1].substring(0, 5); }
                
                // Проверяем, онлайн ли автор сообщения прямо сейчас
                const sender = allUsers.find(u => u.id === m.sender_id);
                const isOnline = sender ? sender.is_online : false;
                const statusColor = isOnline ? 'var(--accent)' : '#888';
                const statusChar = isOnline ? '●' : '○';

                let bCls = (m.sender_id == myData.id) ? "msg-right" : "msg-left";
                if (m.receiver_id == myData.id) bCls += " msg-private";

                return `
                    <div class="msg-bubble ${bCls}">
                        <div class="uk-flex uk-flex-between uk-margin-small-bottom">
                            <span class="uk-text-bold" style="font-size: 0.75em; color: var(--accent);">
                                <span style="color: ${statusColor}; margin-right: 4px;">${statusChar}</span>${m.sender_name.toUpperCase()}
                            </span>
                            <span class="uk-text-muted" style="font-size: 0.65em;">${dStr} | ${tStr}</span>
                        </div>
                        <div style="font-size: 0.9em; word-wrap: break-word;">${m.content}</div>
                    </div>`;
            }).join('');
            box.html(html);
            if (isAtBottom) box.scrollTop(box[0].scrollHeight);
        });
    };

    const send = () => {
        const input = $('#msg-input');
        const val = input.val().trim();
        if (!val) return;
        $.ajax({ url: '/api/chat/send', method: 'POST', contentType: 'application/json', data: JSON.stringify({sender_id: myData.id, receiver_id: parseInt(currentTargetId), content: val}), success: () => { input.val(''); loadChat(); } });
    };

    $(document).ready(() => { if (myData) showMain(); $('#msg-input').on('keypress', (e) => { if (e.which === 13) send(); }); });
</script>
</body>
</html>
