<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SystemIO | Управление</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/uikit@3.17.11/dist/css/uikit.min.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body class="uk-background-secondary uk-light">
	<script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>
        eruda.init();
        window.onerror = function(msg, url, line) {
            console.error("Критическая ошибка: " + msg + "\nФайл: " + url + "\nСтрока: " + line);
        };
        console.log("Eruda активна. Жду ошибок...");
    </script>

    <div id="login-section" class="uk-flex uk-flex-center uk-flex-middle" style="height: 100vh;">
        <div class="uk-card uk-card-default uk-card-body uk-width-medium uk-border-rounded">
            <h3 class="uk-card-title uk-text-center uk-text-secondary">SystemIO Login</h3>
            <form id="login-form">
                <div class="uk-margin">
                    <div class="uk-inline uk-width-1-1">
                        <span class="uk-form-icon" uk-icon="icon: user"></span>
                        <input class="uk-input" type="text" id="admin-login" placeholder="Логин Босса">
                    </div>
                </div>
                <div class="uk-margin">
                    <div class="uk-inline uk-width-1-1">
                        <span class="uk-form-icon" uk-icon="icon: lock"></span>
                        <input class="uk-input" type="password" id="admin-pass" placeholder="Пароль">
                    </div>
                </div>
                <button class="uk-button uk-button-primary uk-width-1-1" type="submit">Войти</button>
            </form>
        </div>
    </div>

    <div id="admin-dashboard" class="uk-container uk-margin-large-top" style="display: none;">
        <header class="uk-margin-bottom">
            <h1 class="uk-heading-divider">Панель управления SystemIO</h1>
            <p>Добро пожаловать, Олег Сергеевич. Система в вашем распоряжении.</p>
        </header>

        <div class="uk-grid-match uk-grid-small" uk-grid>
            <div class="uk-width-1-3@m">
                <div class="uk-card uk-card-secondary uk-card-body uk-border-rounded">
                    <h4 class="uk-card-title">Добавить сотрудника</h4>
                    <form id="add-user-form">
                        <input class="uk-input uk-margin-small" type="text" id="new-username" placeholder="Username (логин)">
                        <input class="uk-input uk-margin-small" type="text" id="new-fullname" placeholder="ФИО полностью">
                        <input class="uk-input uk-margin-small" type="password" id="new-password" placeholder="Пароль">
                        <select class="uk-select uk-margin-small" id="new-role">
                            <option value="employee">Сотрудник</option>
                            <option value="manager">Менеджер</option>
                            <option value="admin">Админ</option>
                        </select>
                        <button class="uk-button uk-button-primary uk-width-1-1 uk-margin-top">Создать аккаунт</button>
                    </form>
                </div>
            </div>

            <div class="uk-width-2-3@m">
                <div class="uk-card uk-card-secondary uk-card-body uk-border-rounded">
                    <h4 class="uk-card-title">Активные пользователи</h4>
                    <table class="uk-table uk-table-divider uk-table-hover">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Логин</th>
                                <th>ФИО</th>
                                <th>Роль</th>
                                <th>Статус</th>
                            </tr>
                        </thead>
                        <tbody id="user-list-table">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/uikit@3.17.11/dist/js/uikit.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/uikit@3.17.11/dist/js/uikit-icons.min.js"></script>
    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>

</body>
</html>
